name: Release (APK)

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run lint
      - name: Build APK with EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          npx eas-cli@latest build -p android --profile preview --non-interactive --wait --json > eas-build.json
      - name: Download APK
        run: |
          APK_URL="$(node scripts/extract-apk-url.mjs eas-build.json)"
          echo "APK_URL=$APK_URL" >> $GITHUB_ENV
          curl -L "$APK_URL" -o "Bowels-${GITHUB_REF_NAME}.apk"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: Bowels-${{ github.ref_name }}.apk

